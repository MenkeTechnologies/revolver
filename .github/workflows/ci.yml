name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          path: revolver

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh curl git

      - name: Set up zunit + register THIS repo's bin/revolver on PATH
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/MenkeTechnologies/zunit
          (cd zunit && ./build.zsh)
          echo "$PWD/zunit" >> "$GITHUB_PATH"
          # zunit requires the `revolver` binary as a hard dependency.
          # We ARE the revolver repo — register its own bin/ on PATH.
          chmod +x revolver/bin/revolver
          echo "$PWD/revolver/bin" >> "$GITHUB_PATH"

      - name: Set terminal env
        run: |
          echo "TERM=xterm" >> "$GITHUB_ENV"
          echo "COLUMNS=120" >> "$GITHUB_ENV"
          echo "LINES=40" >> "$GITHUB_ENV"

      - name: Run zunit tests
        run: |
          set -euo pipefail
          cd revolver
          zunit --verbose tests/*.zsh
